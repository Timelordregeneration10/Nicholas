<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARDIS 3D Model - Doctor Who</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a23, #1a1a3a, #2a2a5a);
            font-family: 'Courier New', monospace;
            color: #00ff88;
            overflow: hidden;
        }

        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border: 2px solid #00ff88;
            border-radius: 10px;
            max-width: calc(100% - 40px);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        #info h3 {
            color: #00ff88;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff88;
        }

        #info p {
            margin: 5px 0;
            line-height: 1.4;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border: 2px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            max-width: calc(100% - 40px);
        }

        .control-group {
            margin: 15px 0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #00ff88;
            font-weight: bold;
        }

        input[type="range"] {
            width: 200px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: #00ff88;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #00ff88;
        }

        button {
            background: linear-gradient(45deg, #003366, #004488);
            color: #00ff88;
            border: 1px solid #00ff88;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background: linear-gradient(45deg, #004488, #0066aa);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            transform: translateY(-2px);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8rem;
            color: #00ff88;
            z-index: 200;
            text-align: center;
            text-shadow: 0 0 15px #00ff88;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 255, 136, 0.3);
            border-left: 4px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid #ff4444;
            color: #ff4444;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 300;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="loading">
            <div>正在加载 TARDIS 模型...</div>
            <div class="loading-spinner"></div>
        </div>
        
        <div id="error">
            <h3>加载错误</h3>
            <p>无法加载 TARDIS 模型文件，请检查文件路径是否正确。</p>
        </div>
        
        <div id="info" style="display: none;">
            <h3>🚀 TARDIS 3D 模型</h3>
            <p><strong>Time And Relative Dimension In Space</strong></p>
            <p>• 鼠标左键拖拽: 旋转视角</p>
            <p>• 鼠标滚轮: 缩放</p>
            <p>• 鼠标右键拖拽: 平移</p>
            <p>• 使用下方控制面板调整参数</p>
        </div>

        <div id="controls" style="display: none;">
            <div class="control-group">
                <label>自动旋转速度:</label>
                <input type="range" id="rotationSpeed" min="0" max="0.03" step="0.001" value="0.005">
                <span id="rotationValue">0.005</span>
            </div>
            <div class="control-group">
                <label>主光源强度:</label>
                <input type="range" id="lightIntensity" min="0" max="3" step="0.1" value="1.5">
                <span id="lightValue">1.5</span>
            </div>
            <div class="control-group">
                <label>环境光强度:</label>
                <input type="range" id="ambientIntensity" min="0" max="1" step="0.05" value="0.3">
                <span id="ambientValue">0.3</span>
            </div>
            <div class="control-group">
                <button id="toggleAnimation">停止自动旋转</button>
                <button id="resetView">重置视角</button>
                <button id="toggleWireframe">线框模式</button>
            </div>
        </div>
    </div>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>

    <script>
        // 全局变量
        let scene, camera, renderer, tardisModel, controls;
        let animationId;
        let isAnimating = true;
        let rotationSpeed = 0.005;
        let directionalLight, ambientLight;
        let isWireframe = false;
        
        // 初始化场景
        function init() {
            // 创建场景
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x0a0a23, 10, 100);

            // 创建相机 - 调整初始位置更远
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(25, 20, 35); // 大幅增加距离

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true,
                powerPreference: "high-performance"
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x0a0a23, 1);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('container').appendChild(renderer.domElement);

            // 添加轨道控制器 - 调整距离限制
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = true;
            controls.enablePan = true;
            controls.minDistance = 15; // 增加最小距离
            controls.maxDistance = 150; // 增加最大距离
            controls.maxPolarAngle = Math.PI;

            // 设置灯光
            setupLighting();

            // 添加星空背景
            createStarField();

            // 创建地面
            // createGround();

            // 加载TARDIS模型
            loadTARDISModel();

            // 设置控制器事件
            setupControls();

            // 开始动画循环
            animate();
        }

        // 设置灯光
        function setupLighting() {
            // 环境光
            ambientLight = new THREE.AmbientLight(0x404040, 0.3);
            scene.add(ambientLight);

            // 主要方向光 (模拟太阳光)
            directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
            directionalLight.position.set(10, 15, 5);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            directionalLight.shadow.camera.near = 0.5;
            directionalLight.shadow.camera.far = 50;
            directionalLight.shadow.camera.left = -20;
            directionalLight.shadow.camera.right = 20;
            directionalLight.shadow.camera.top = 20;
            directionalLight.shadow.camera.bottom = -20;
            directionalLight.shadow.bias = -0.0001;
            scene.add(directionalLight);

            // 蓝色补充光 (模拟TARDIS的蓝色氛围)
            const blueLight = new THREE.DirectionalLight(0x4A90E2, 0.3);
            blueLight.position.set(-5, 10, -5);
            scene.add(blueLight);

            // 顶部点光源 (模拟TARDIS灯光)
            const topLight = new THREE.PointLight(0xffffff, 0.8, 20);
            topLight.position.set(0, 8, 0);
            topLight.castShadow = true;
            scene.add(topLight);
        }

        // 创建星空背景
        function createStarField() {
            const starGeometry = new THREE.BufferGeometry();
            const starMaterial = new THREE.PointsMaterial({ 
                color: 0xffffff, 
                size: 0.8,
                transparent: true,
                opacity: 0.8
            });

            const starVertices = [];
            for (let i = 0; i < 1500; i++) {
                const x = (Math.random() - 0.5) * 400;
                const y = (Math.random() - 0.5) * 400;
                const z = (Math.random() - 0.5) * 400;
                starVertices.push(x, y, z);
            }

            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
        }

        // 创建地面
        function createGround() {
            const groundGeometry = new THREE.PlaneGeometry(50, 50);
            const groundMaterial = new THREE.MeshLambertMaterial({ 
                color: 0x222222,
                transparent: true,
                opacity: 0.3
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);
        }

        // 加载TARDIS模型
        function loadTARDISModel() {
            const mtlLoader = new THREE.MTLLoader();
            
            // 首先加载材质文件
            mtlLoader.load('./tardisObj/tardis.mtl', function(materials) {
                materials.preload();
                
                // 修改材质以符合TARDIS的经典外观
                if (materials.materials.Blue) {
                    materials.materials.Blue.color.setHex(0x003B6F); // TARDIS蓝
                    materials.materials.Blue.shininess = 50;
                }
                if (materials.materials.Black) {
                    materials.materials.Black.color.setHex(0x000000);
                }
                if (materials.materials.White) {
                    materials.materials.White.color.setHex(0xffffff);
                    materials.materials.White.emissive.setHex(0x222222);
                }
                
                // 加载OBJ文件
                const objLoader = new THREE.OBJLoader();
                objLoader.setMaterials(materials);
                
                objLoader.load('./tardisObj/tardis.obj', function(object) {
                    tardisModel = object;
                    
                    // 调整模型大小和位置
                    tardisModel.scale.set(4, 4, 4); // 放大模型
                    tardisModel.position.set(0, 0, 0);
                    tardisModel.rotation.y = Math.PI; // 旋转180度面向观察者
                    
                    // 启用阴影
                    // 替换为点云（仅顶点发光）
                    const pointGroup = new THREE.Group();
                    tardisModel.traverse(function(child) {
                        if (child instanceof THREE.Mesh) {
                            const geometry = child.geometry;
                            if (geometry.isBufferGeometry) {
                                // 创建点材质（发光效果）
                                const pointMaterial = new THREE.PointsMaterial({
                                    color: 0x00ff88,
                                    size: 0.2,
                                    sizeAttenuation: true,
                                    transparent: true,
                                    opacity: 0.9
                                });
                                const points = new THREE.Points(geometry, pointMaterial);
                                pointGroup.add(points);
                            }
                        }
                    });
                    scene.add(pointGroup);
                    tardisModel = pointGroup; // 更新全局引用
                    
                    scene.add(tardisModel);
                    
                    // 隐藏加载提示，显示控制界面
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('info').style.display = 'block';
                    document.getElementById('controls').style.display = 'block';
                    
                    console.log('TARDIS model loaded successfully!');
                }, 
                // 加载进度回调
                function(progress) {
                    console.log('Loading progress: ', (progress.loaded / progress.total * 100) + '%');
                },
                // 加载错误回调
                function(error) {
                    console.error('Error loading OBJ:', error);
                    showError();
                });
            },
            // MTL加载进度回调
            function(progress) {
                console.log('MTL Loading progress: ', (progress.loaded / progress.total * 100) + '%');
            },
            // MTL加载错误回调
            function(error) {
                console.error('Error loading MTL:', error);
                // 即使MTL加载失败，也尝试加载OBJ
                loadOBJOnly();
            });
        }

        // 仅加载OBJ文件（当MTL加载失败时）
        function loadOBJOnly() {
            const objLoader = new THREE.OBJLoader();
            
            objLoader.load('./tardisObj/tardis.obj', function(object) {
                tardisModel = object;
                
                // 应用默认TARDIS材质
                // 替换为点云（仅顶点发光）
                const pointGroup = new THREE.Group();
                tardisModel.traverse(function(child) {
                    if (child instanceof THREE.Mesh) {
                        const geometry = child.geometry;
                        if (geometry.isBufferGeometry) {
                            const pointMaterial = new THREE.PointsMaterial({
                                color: 0x00ff88,
                                size: 0.2,
                                sizeAttenuation: true,
                                transparent: true,
                                opacity: 0.9
                            });
                            const points = new THREE.Points(geometry, pointMaterial);
                            pointGroup.add(points);
                        }
                    }
                });
                scene.add(pointGroup);
                tardisModel = pointGroup;
                
                tardisModel.scale.set(4, 4, 4);
                tardisModel.position.set(0, 0, 0);
                tardisModel.rotation.y = Math.PI;
                
                scene.add(tardisModel);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('info').style.display = 'block';
                document.getElementById('controls').style.display = 'block';
                
                console.log('TARDIS model loaded (without MTL)!');
            },
            function(progress) {
                console.log('OBJ Loading progress: ', (progress.loaded / progress.total * 100) + '%');
            },
            function(error) {
                console.error('Error loading OBJ:', error);
                showError();
            });
        }

        // 显示错误信息
        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }

        // 设置控制器
        function setupControls() {
            const rotationSlider = document.getElementById('rotationSpeed');
            const lightSlider = document.getElementById('lightIntensity');
            const ambientSlider = document.getElementById('ambientIntensity');
            const animationButton = document.getElementById('toggleAnimation');
            const resetButton = document.getElementById('resetView');
            const wireframeButton = document.getElementById('toggleWireframe');

            // 旋转速度控制
            rotationSlider.addEventListener('input', (e) => {
                rotationSpeed = parseFloat(e.target.value);
                document.getElementById('rotationValue').textContent = rotationSpeed.toFixed(3);
            });

            // 主光源强度控制
            lightSlider.addEventListener('input', (e) => {
                const intensity = parseFloat(e.target.value);
                directionalLight.intensity = intensity;
                document.getElementById('lightValue').textContent = intensity.toFixed(1);
            });

            // 环境光强度控制
            ambientSlider.addEventListener('input', (e) => {
                const intensity = parseFloat(e.target.value);
                ambientLight.intensity = intensity;
                document.getElementById('ambientValue').textContent = intensity.toFixed(2);
            });

            // 动画开关
            animationButton.addEventListener('click', () => {
                isAnimating = !isAnimating;
                animationButton.textContent = isAnimating ? '停止自动旋转' : '开始自动旋转';
            });

            // 重置视角
            resetButton.addEventListener('click', () => {
                camera.position.set(25, 20, 35); // 更新重置位置
                controls.reset();
            });

            // 点云模式下线框无效
            wireframeButton.disabled = true;
            wireframeButton.title = "点云模式下不可用";
        }

        // 动画循环
        function animate() {
            animationId = requestAnimationFrame(animate);

            // 自动旋转TARDIS
            if (isAnimating && tardisModel) {
                tardisModel.rotation.y += rotationSpeed;
            }

            // 更新控制器
            controls.update();

            // 渲染场景
            renderer.render(scene, camera);
        }

        // 窗口大小调整
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 事件监听器
        window.addEventListener('resize', onWindowResize, false);

        // 键盘控制
        document.addEventListener('keydown', (event) => {
            switch(event.code) {
                case 'Space':
                    event.preventDefault();
                    isAnimating = !isAnimating;
                    document.getElementById('toggleAnimation').textContent = 
                        isAnimating ? '停止自动旋转' : '开始自动旋转';
                    break;
                case 'KeyR':
                    camera.position.set(25, 20, 35); // 更新重置位置
                    controls.reset();
                    break;
                case 'KeyW':
                    isWireframe = !isWireframe;
                    if (tardisModel) {
                        tardisModel.traverse(function(child) {
                            if (child instanceof THREE.Mesh && child.material) {
                                // 处理材质数组的情况
                                if (Array.isArray(child.material)) {
                                    child.material.forEach(material => {
                                        if (material) {
                                            material.wireframe = isWireframe;
                                        }
                                    });
                                } else {
                                    child.material.wireframe = isWireframe;
                                }
                            }
                        });
                    }
                    document.getElementById('toggleWireframe').textContent = 
                        isWireframe ? '实体模式' : '线框模式';
                    break;
            }
        });

        // 启动应用
        init();
    </script>
</body>
</html>
